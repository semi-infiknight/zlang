name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Build native library
        run: cargo build --release
      - name: Install package
        run: npm install
      - name: Run tests
        run: npm test
