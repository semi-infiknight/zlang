name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-13
            label: darwin-x64
          - os: macos-14
            label: darwin-arm64
          - os: windows-latest
            label: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install JS dependencies
        run: npm install
      - name: Build native library
        run: cargo build --release
      - name: Prepare release asset
        run: npm run prepare:release-asset
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
